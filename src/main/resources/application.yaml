# user-service/application.yaml

spring:
  application:
    name: user-service  # Eureka 등록명 / Config Server 설정 경로명으로 사용

  profiles:
    active: local  # 기본 프로파일 (IDE에서 별도 지정 없을 때 로컬로 실행)

  config:
    import:
      # 프로젝트 루트의 .env 파일에서 환경변수 로드 (IntelliJ 구성편집 불필요)
      - "optional:file:.env[.properties]"                    # Working Dir = user-service/  일 때
      - "optional:configserver:"             # URL 없이 Eureka 디스커버리로 Config Server 탐색

  cloud:
    # ECS Fargate에서 Eureka에 자기 IP를 ECS 메타데이터 IP(169.254.172.2)가 아닌 VPC 내부 IP(172.31.x.x)로 등록되게 하기 위한 설정.
    # InetUtils가 IP 선택 시점이 Config Server 받기 전이라
    inetutils:
      preferred-networks:
        - 10\.
        - 172\.
        - 192\.168\.
    config:
      username: ${CONFIG_SERVER_USERNAME}  # Config Server Basic Auth
      password: ${CONFIG_SERVER_PASSWORD}
      discovery:
        enabled: true
        service-id: config-server

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_SERVER_URL:localhost}:8761/eureka/
