# docker-compose.yml로 실행한 로컬 인프라(PostgreSQL, Redis, Keycloak)에 접속
spring:
  config:
    activate:
      on-profile: local  # local 프로파일에서만 적용

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_service}
    username: ${DB_USERNAME:postgres}   # 로컬 docker-compose 기본값
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}   # 로컬 Redis 주소
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}  # 로컬 Eureka 주소

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8180}  # 로컬 Keycloak 주소
  client-secret: ${KEYCLOAK_CLIENT_SECRET:}          # 로컬 클라이언트 시크릿
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}   # Keycloak Admin API 자격증명
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
