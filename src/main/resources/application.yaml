# user-service/application.yaml

spring:
  application:
    name: user-service  # Eureka 등록명 / Config Server 설정 경로명으로 사용

  profiles:
    active: local  # 기본 프로파일 (IDE에서 별도 지정 없을 때 로컬로 실행)

  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"  # Config Server 주소

  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:admin}  # Config Server Basic Auth
      password: ${CONFIG_SERVER_PASSWORD:admin}
