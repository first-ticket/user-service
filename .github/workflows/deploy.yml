name: CI/CD - Build, Test, and Deploy

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
      - chore/45-deploy    # 임시, 테스트 끝나면 제거
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: first-ticket/user-service
  # GitHub Packages 인증 - common 모듈 가져오기 위해 필요
  GITHUB_USER: ${{ secrets.GH_USER }}
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  # 1) 빌드 + 테스트 (모든 PR/push에서 실행)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew build --no-daemon

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: build/reports/tests/
          retention-days: 7

  # 2) ECR 푸시 (main 또는 작업 브랜치 push 시)
  push-to-ecr:
    needs: build-and-test
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/chore/45-deploy')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg GITHUB_USER=${{ secrets.GH_USER }} \
            --secret id=github_token,env=GITHUB_TOKEN \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .

      - name: Show pushed image
        run: |
          echo "✅ Pushed: $ECR_REPOSITORY:${{ github.sha }}"
          echo "✅ Pushed: $ECR_REPOSITORY:latest"
