# first-ticket / user-service CI/CD 통합 워크플로우
# 트리거: main·dev 브랜치 PR 또는 push 시에 실행
# 단계 1 - build-and-test (모든 이벤트)
# 단계 2 - push-to-ecr (main push 시)

name: CI/CD - Build, Test, and Deploy

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  id-token: write   # OIDC 방식으로 AWS 인증하기 위한 JWT 발급 권한
  contents: read    # 코드 체크아웃에 필요한 최소 권한
  packages: read    # GitHub Packages(common 모듈)에서 의존성 다운로드

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: first-ticket/user-service # ECR repository name

  # GitHub Packages 인증 정보 (common 모듈 접근용)
  # Repository Secrets에 GH_USER, GH_TOKEN 등록 필요
  GITHUB_USER: ${{ secrets.GH_USER }}
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:

  # Job 1: 빌드 + 테스트 (PR·push 모두 실행)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew test asciidoctor bootJar --no-daemon

      # 빌드 실패 시 테스트 리포트를 아티팩트로 업로드 (7일 보관)
      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/
          retention-days: 7

  # Job 2: ECR 이미지 푸시 + ECS 배포
  # 조건: main 브랜치에 push 이벤트일 때만 실행
  push-to-ecr:
    needs: build-and-test # build-and-test 성공 후 실행
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC 방식으로 AWS 자격증명 구성 (장기 키 없이 임시 토큰 발급)
      # AWS_ROLE_ARN: IAM Role ARN을 Repository Secret에 등록 필요
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ECR 로그인 (이후 스텝에서 registry 주소를 outputs으로 참조)
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # linux/amd64 크로스 플랫폼 빌드를 위한 Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker 이미지 빌드 → ECR 푸시
      # 태그: 커밋 SHA(불변) + latest(최신) 두 개를 동시에 푸시
      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}   # ← env로 노출
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg GITHUB_USER=${{ secrets.GH_USER }} \
            --secret id=github_token,env=GITHUB_TOKEN \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .

      # 푸시 완료된 이미지 태그 확인 출력
      - name: Show pushed image
        run: |
          echo "Pushed: $ECR_REPOSITORY:${{ github.sha }}"
          echo "Pushed: $ECR_REPOSITORY:latest"

      # 현재 ECS 태스크 정의를 JSON으로 다운로드
      # 이후 스텝에서 이미지 태그만 교체하여 새 리비전 등록
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition user-service \
            --query taskDefinition > task-definition.json

      # ECS 서비스에 새 태스크 정의 배포
      # wait-for-service-stability: false → 배포 완료를 기다리지 않음 (빠른 파이프라인)
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: user-service-service   # ECS 서비스명
          cluster: first-ticket-cluster   # ECS 클러스터명
          wait-for-service-stability: false
